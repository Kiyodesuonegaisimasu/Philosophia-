var PH = DATA.P, QS = DATA.Q;
var AXES = ["A","B","C","D"];
var AXLABEL = [["理性","情熱"],["個人","社会"],["現実","超越"],["体系","解体"]];
var BASE = "https://philosophia-psi.vercel.app";
function img(f,w){ return "https://commons.wikimedia.org/wiki/Special:FilePath/"+encodeURIComponent(f)+"?width="+(w||300); }
function $(id){ return document.getElementById(id); }

// 軸ごとの到達可能レンジ（正規化用）
var PMAX={A:0,B:0,C:0,D:0}, PMIN={A:0,B:0,C:0,D:0};
AXES.forEach(function(k){
  QS.forEach(function(q){
    var hi=-99, lo=99;
    q.o.forEach(function(o){ var v=o.d[k]||0; if(v>hi)hi=v; if(v<lo)lo=v; });
    PMAX[k]+=hi; PMIN[k]+=lo;
  });
});

// 顔プレビュー
(function(){
  var pick=["socrates","friedrich-nietzsche","immanuel-kant","laozi","hannah-arendt","rene-descartes"];
  var el=$("faces");
  pick.forEach(function(s){
    var p=PH.filter(function(x){return x.s===s;})[0]; if(!p) return;
    var im=document.createElement("img"); im.src=img(p.i,120); im.alt=p.n; im.loading="lazy"; el.appendChild(im);
  });
})();

var answers=[], qi=0;

function showQ(){
  $("scStart").classList.add("hide"); $("scR").classList.add("hide"); $("scQ").classList.remove("hide");
  var q=QS[qi];
  var pr=$("prog"); pr.innerHTML="";
  for(var i=0;i<QS.length;i++){ var b=document.createElement("i"); if(i<=qi) b.className="on"; pr.appendChild(b); }
  $("qnum").textContent="QUESTION "+(qi+1)+" / "+QS.length;
  $("qtext").textContent=q.q;
  var wrap=$("opts"); wrap.innerHTML="";
  q.o.forEach(function(o,idx){
    var b=document.createElement("button"); b.className="opt"; b.type="button"; b.textContent=o.t;
    b.onclick=function(){ answers[qi]=idx; qi++; if(qi>=QS.length) showR(); else showQ(); window.scrollTo(0,0); };
    wrap.appendChild(b);
  });
  $("btnBack").classList.toggle("hide", qi===0);
}

function userVec(){
  var s={A:0,B:0,C:0,D:0};
  answers.forEach(function(a,i){ var d=QS[i].o[a].d; AXES.forEach(function(k){ s[k]+=(d[k]||0); }); });
  return AXES.map(function(k){
    var v=s[k];
    if(v>=0) return PMAX[k] ? 2*v/PMAX[k] : 0;
    return PMIN[k] ? 2*v/Math.abs(PMIN[k]) : 0;
  });
}

function showR(){
  $("scQ").classList.add("hide"); $("scStart").classList.add("hide"); $("scR").classList.remove("hide");
  var u=userVec();
  var mag=Math.sqrt(u[0]*u[0]+u[1]*u[1]+u[2]*u[2]+u[3]*u[3]);
  var scored=PH.map(function(p){
    var dot=0, pb=0, e=0;
    for(var i=0;i<4;i++){ dot+=u[i]*p.v[i]; pb+=p.v[i]*p.v[i]; var x=u[i]-p.v[i]; e+=x*x; }
    var cosv=(mag>0&&pb>0) ? dot/(mag*Math.sqrt(pb)) : 0;
    return {p:p, d:-cosv + Math.sqrt(e)*0.001};
  }).sort(function(a,b){ return a.d-b.d; });
  var top=scored[0].p;
  render(top, scored.slice(1,4).map(function(x){return x.p;}), u);
}

function render(p, near, u){
  $("rimg").src=img(p.i,400); $("rimg").alt=p.n;
  $("rname").textContent=p.n;
  $("ren").textContent=p.e;
  $("rera").textContent=p.r;
  $("rquote").textContent="「"+p.q+"」";
  $("rdesc").textContent=p.d;
  $("rmore").href="/deep/"+p.s+"?v="+u.map(function(x){return x.toFixed(2);}).join(",");
  $("rsub").href="/p/"+p.s;

  var bars=$("bars"); bars.innerHTML="";
  for(var i=0;i<4;i++){
    var pos=((u[i]+2)/4)*100; if(pos<3)pos=3; if(pos>97)pos=97;
    var d=document.createElement("div"); d.className="bar";
    d.innerHTML='<div class="lb"><span>'+AXLABEL[i][0]+'</span><span>'+AXLABEL[i][1]+'</span></div><div class="tr"><b style="left:'+pos.toFixed(1)+'%"></b></div>';
    bars.appendChild(d);
  }

  var nr=$("near"); nr.innerHTML="";
  near.forEach(function(x){
    var a=document.createElement("a"); a.href="/p/"+x.s;
    a.innerHTML='<img src="'+img(x.i,120)+'" alt="" loading="lazy"><span><span class="nm">'+x.n+'</span><br><span class="nd">'+x.r+'</span></span>';
    nr.appendChild(a);
  });

  var url=BASE+"/q/"+p.s;
  var txt="私に近い哲学者は「"+p.n+"」でした。";
  $("shX").href="https://twitter.com/intent/tweet?text="+encodeURIComponent(txt+"\n#哲学者診断")+"&url="+encodeURIComponent(url);
  $("shL").href="https://social-plugins.line.me/lineit/share?url="+encodeURIComponent(url)+"&text="+encodeURIComponent(txt);
  $("shC").onclick=function(){
    var done=function(){ $("shC").textContent="コピーしました ✓"; setTimeout(function(){ $("shC").textContent="リンクをコピー"; },1800); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done,done); }
    else { var t=document.createElement("textarea"); t.value=url; document.body.appendChild(t); t.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(t); done(); }
  };
  try{ history.replaceState(null,"","/quiz.html?r="+p.s); }catch(e){}
}

$("btnStart").onclick=function(){ answers=[]; qi=0; showQ(); window.scrollTo(0,0); };
$("btnBack").onclick=function(){ if(qi>0){ qi--; showQ(); window.scrollTo(0,0);} };
$("btnRetry").onclick=function(){ answers=[]; qi=0; try{history.replaceState(null,"","/quiz.html");}catch(e){} showQ(); window.scrollTo(0,0); };
</script>
