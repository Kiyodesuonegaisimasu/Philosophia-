var PH = DATA.P;
var REGIONS = [
  {k:"west", label:"ヨーロッパ・地中海"},
  {k:"islam",label:"イスラーム・ユダヤ圏"},
  {k:"china",label:"中国"},
  {k:"india",label:"インド"},
  {k:"japan",label:"日本"}
];
var PRESETS = [
  {y:-450, t:"前450年 枢軸時代"},
  {y:-350, t:"前350年"},
  {y:1135, t:"1135年 5つの世界"},
  {y:1180, t:"1180年 東の時代"},
  {y:1640, t:"1640年 理性の世紀"},
  {y:1900, t:"1900年"},
  {y:1950, t:"1950年"}
];
var NOTES = {
  "-450":"ソクラテス19歳、ブッダ13歳、墨子20歳。互いを知らないまま、同じ時代に。",
  "1135":"収録228人のうち、5つの地域すべてに同時に思想家がいた稀な年。",
  "1180":"ヨーロッパに一人もいない。だが東では8人が同時に考えていた。",
  "1640":"デカルト44歳。ヨーロッパが理性に賭けはじめた頃、日本では伊藤仁斎が13歳。",
  "1900":"ニーチェが世を去った年。ハイデガーは11歳、ウィトゲンシュタインも11歳だった。"
};
var MINY=-620, MAXY=2026, BUCKETS=88;
function $(id){ return document.getElementById(id); }
function img(f,w){ return "https://commons.wikimedia.org/wiki/Special:FilePath/"+encodeURIComponent(f)+"?width="+(w||120); }
function fmtYear(y){ return y<0 ? "紀元前"+(-y)+"年" : y+"年"; }
function aliveAt(y){ var o=[]; for(var i=0;i<PH.length;i++){ var p=PH[i]; if(p.b<=y&&p.d>=y) o.push(p); } return o; }
function hue(s){ var h=0; for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%360; }

/* 密度ストリップ */
var counts=[];
(function(){
  var step=(MAXY-MINY)/BUCKETS, mx=0;
  for(var i=0;i<BUCKETS;i++){
    var y=Math.round(MINY+step*(i+0.5));
    var c=aliveAt(y).length; counts.push(c); if(c>mx) mx=c;
  }
  var h=$("hist");
  for(var i=0;i<BUCKETS;i++){
    var b=document.createElement("i");
    b.style.height=Math.max(2, Math.round(counts[i]/mx*32))+"px";
    if(counts[i]>0) b.className="hot";
    h.appendChild(b);
  }
  h.onclick=function(e){
    var r=h.getBoundingClientRect();
    var f=(e.clientX-r.left)/r.width;
    setYear(Math.round(MINY+(MAXY-MINY)*f));
  };
})();

/* プリセット */
(function(){
  var w=$("presets");
  PRESETS.forEach(function(p){
    var b=document.createElement("button"); b.className="pz"; b.type="button"; b.textContent=p.t;
    b.setAttribute("data-y", p.y);
    b.onclick=function(){ setYear(p.y); };
    w.appendChild(b);
  });
})();

function render(y){
  $("yr").textContent=fmtYear(y);
  var list=aliveAt(y);

  // 密度ストリップの現在位置
  var step=(MAXY-MINY)/BUCKETS;
  var idx=Math.min(BUCKETS-1, Math.max(0, Math.floor((y-MINY)/step)));
  var bars=$("hist").children;
  for(var i=0;i<bars.length;i++){
    bars[i].className = (i===idx) ? "cur" : (counts[i]>0 ? "hot" : "");
  }
  // プリセットの選択状態
  var pzs=$("presets").children;
  for(var i=0;i<pzs.length;i++){ pzs[i].classList.toggle("on", +pzs[i].getAttribute("data-y")===y); }

  var regs=REGIONS.filter(function(r){ return list.some(function(p){ return p.r===r.k; }); }).length;
  $("headline").innerHTML = list.length
    ? "この年、<b>"+regs+"つの地域</b>で <b>"+list.length+"人</b> が同時に生きていました。"
    : "この年に生きていた思想家は、収録データにいません。";
  $("note").textContent = NOTES[String(y)] || "";

  var g=$("grid"); g.innerHTML="";
  REGIONS.forEach(function(r){
    var l=list.filter(function(p){ return p.r===r.k; }).sort(function(a,b){ return a.b-b.b; });
    var col=document.createElement("div");
    col.className="col"+(l.length?"":" empty");
    var head='<h2>'+r.label+' <span class="cnt">'+(l.length?l.length+"人":"—")+'</span></h2>';
    var body=l.length ? '<div class="plist">'+l.map(function(p){
      var age=y-p.b;
      var face = p.i
        ? '<img src="'+img(p.i,80)+'" alt="" loading="lazy">'
        : '<div class="ph" style="background:linear-gradient(135deg,hsl('+hue(p.n)+' 45% 32%),hsl('+((hue(p.n)+40)%360)+' 50% 20%))">'+p.n.charAt(0)+'</div>';
      return '<a class="pchip" href="/p/'+p.s+'">'+face+'<span><span class="nm">'+p.n+'</span><br><span class="ag">'+(age<=0?"この年に誕生":age+"歳")+'</span></span></a>';
    }).join("")+'</div>' : '<div class="none">この地域の思想家は<br>収録されていません</div>';
    col.innerHTML=head+body;
    g.appendChild(col);
  });

  var url="https://philosophia-psi.vercel.app/era.html?y="+y;
  var txt = NOTES[String(y)] ? NOTES[String(y)] : fmtYear(y)+"、世界では"+list.length+"人の思想家が同時に生きていた。";
  $("shX").href="https://twitter.com/intent/tweet?text="+encodeURIComponent(txt+"\n#哲学")+"&url="+encodeURIComponent(url);
  try{ history.replaceState(null,"","/era.html?y="+y); }catch(e){}
}

function setYear(y){
  y=Math.max(MINY,Math.min(MAXY,Math.round(y)));
  $("sl").value=y; render(y);
}
$("sl").addEventListener("input",function(){ render(+this.value); });
$("mi").onclick=function(){ setYear(+$("sl").value-10); };
$("pl").onclick=function(){ setYear(+$("sl").value+10); };
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowLeft"){ setYear(+$("sl").value-10); }
  else if(e.key==="ArrowRight"){ setYear(+$("sl").value+10); }
});

(function(){
  var m=location.search.match(/[?&]y=(-?\d+)/);
  setYear(m ? +m[1] : -450);
})();
</script>
