<!DOCTYPE html>
<!-- リポジトリ内の置き場所: /members.html -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プレミアム会員 — Philosophia</title>
<style>
  :root{--bg:#0a0a0a;--bg2:#161616;--card:#1c1c1c;--text:#f1f1f1;--sub:#a8a8a8;--line:#2c2c2c;--accent:#c9a24b;--accent2:#7b5cff}
  *{box-sizing:border-box;margin:0;padding:0}
  html{background:var(--bg)}
  body{background:transparent;color:var(--text);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;line-height:1.8}
  #bgParticles{position:fixed;inset:0;width:100%;height:100%;z-index:-1;pointer-events:none}
  a{color:var(--accent2)}
  header{padding:16px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;row-gap:8px}
  header .back-top{margin-left:14px;font-size:13px;letter-spacing:.08em;font-weight:600;white-space:nowrap;
    background:linear-gradient(180deg,#f2f4f8,#aeb4bf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    border:1px solid #3a3f47;border-radius:20px;padding:7px 15px;text-decoration:none;transition:.2s}
  header .back-top:hover{border-color:#9aa0aa;box-shadow:0 0 14px rgba(210,215,224,.2)}
  header .mark{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent),#6b4c1a);display:grid;place-items:center;font-size:16px;color:#111;font-weight:900}
  header b{font-size:18px}
  .wrap{max-width:760px;margin:0 auto;padding:36px 22px 90px}
  h1{font-size:24px;font-weight:800;margin-bottom:6px}
  .lead{color:var(--sub);font-size:14px;margin-bottom:24px}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px}
  input[type=email],input[type=text]{width:100%;padding:13px 14px;border-radius:10px;border:1px solid var(--line);background:#111;color:#fff;font-size:15px;margin:10px 0}
  #code{letter-spacing:.35em;font-size:20px;text-align:center}
  button,.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;border-radius:24px;border:none;background:var(--accent);color:#111;font-weight:800;font-size:14.5px;cursor:pointer;text-decoration:none}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--sub);font-weight:600}
  .status{font-size:14px;color:var(--sub)}
  .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12.5px;font-weight:800}
  .badge.on{background:rgba(46,125,91,.2);color:#84e0a8;border:1px solid #2e7d5b}
  .badge.trial{background:rgba(123,92,255,.15);color:#c9bcff;border:1px solid #4a3d8f}
  .badge.off{background:rgba(201,162,75,.12);color:#e9c46a;border:1px solid #6b4c1a}
  .muted{color:var(--sub);font-size:12.5px}
  .hide{display:none}
  .back{display:inline-block;margin-top:22px;font-size:13.5px}
  /* メイン画面への埋め込み表示（?embed=1） */
  body.embed header{display:none}
  body.embed .back{display:none}
  body.embed .wrap{padding:18px 20px 60px}
  body.embed h1{font-size:20px}
  .err{color:#e9a463;font-size:13px;margin-top:8px}

  /* --- プレミアム本体 --- */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 22px}
  .tab{padding:9px 15px;border-radius:22px;border:1px solid var(--line);background:transparent;color:var(--sub);font-size:13.5px;font-weight:700;cursor:pointer}
  .tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .panel{display:none}
  .panel.active{display:block}
  .item{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:#141414}
  .item>.head{padding:15px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .item .ttl{font-size:16px;font-weight:800}
  .item .sub{font-size:13px;color:var(--sub);margin-top:3px}
  .item .meta{font-size:11.5px;color:var(--accent);white-space:nowrap;margin-top:3px}
  .item .body{padding:0 18px 18px;display:none}
  .item.open .body{display:block}
  .item .chev{color:var(--sub);font-size:13px;margin-top:3px}
  .step{border-top:1px solid var(--line);padding:12px 0}
  .step .n{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--accent2);color:#fff;font-size:12px;font-weight:800;margin-right:8px}
  .step .nm{font-weight:800;font-size:14.5px}
  .step .why{font-size:13.5px;color:#e0e0e0;margin:5px 0 3px}
  .step .fc{font-size:12.5px;color:var(--accent)}
  .kv{margin:10px 0}
  .kv .k{font-size:12px;color:var(--accent);font-weight:800;letter-spacing:.03em}
  .kv .v{font-size:14px;color:#e6e6e6;margin-top:2px}
  .pos{border-top:1px solid var(--line);padding:11px 0}
  .pos .who{font-weight:800;font-size:14px}
  .pos .claim{color:var(--accent2);font-size:13.5px;font-weight:700;margin:2px 0}
  .pos .dt{font-size:13px;color:#dcdcdc}
  .intro-p{font-size:14px;color:#e6e6e6;margin-bottom:10px}
  .q-p{font-size:13.5px;color:#efe6c9;font-style:italic;border-left:3px solid var(--accent);padding-left:12px;margin:10px 0}
  .gsearch{width:100%;margin-bottom:14px}
  .gitem{border-bottom:1px solid var(--line);padding:12px 0}
  .gitem .gt{font-weight:800;font-size:15px}
  .gitem .gr{font-size:11.5px;color:var(--sub);margin-left:6px}
  .gitem .gs{font-size:13.5px;color:#e6e6e6;margin-top:3px}
  .gitem .gd{font-size:13px;color:var(--sub);margin-top:4px}
  .quiz .qq{font-weight:700;font-size:14.5px;margin:14px 0 8px}
  .choice{display:block;width:100%;text-align:left;background:#111;border:1px solid var(--line);color:#eee;border-radius:9px;padding:11px 13px;margin:6px 0;font-size:14px;cursor:pointer;font-weight:600}
  .choice.correct{background:rgba(46,125,91,.22);border-color:#2e7d5b;color:#bff0d0}
  .choice.wrong{background:rgba(201,80,80,.18);border-color:#8f3d3d;color:#f0c0c0}
  .explain{font-size:13px;color:#cdead9;margin:6px 0 4px;padding:9px 12px;background:rgba(46,125,91,.1);border-radius:8px;display:none}
  .explain.show{display:block}
  /* 初級・中級・上級 */
  .lvltabs{display:flex;gap:8px;margin:4px 0 14px}
  .lvltab{flex:1;padding:9px 6px;border-radius:10px;border:1px solid var(--line);background:#111;color:var(--sub);font-size:13px;font-weight:800;cursor:pointer}
  .lvltab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .lvlpanel{display:none}
  .lvlpanel.active{display:block}
  .lvl-lead{font-size:14px;color:#efe6c9;background:rgba(201,162,75,.08);border-left:3px solid var(--accent);padding:10px 14px;border-radius:8px;margin-bottom:12px}
  .lvl-wc{font-size:11.5px;color:var(--sub);font-weight:700;margin-bottom:10px}
  .badge-lv{display:inline-block;margin-left:8px;font-size:10.5px;font-weight:800;color:#c9bcff;border:1px solid #4a3d8f;border-radius:10px;padding:1px 7px;vertical-align:middle}
</style>
</head>
<body>
<canvas id="bgParticles" aria-hidden="true"></canvas>
<header><span class="mark">φ</span><b>Philosophia</b><span style="color:var(--accent);font-weight:700">&nbsp;プレミアム会員</span><a class="back-top" href="/philosophia.html">← Philosophia へ戻る</a></header>
<div class="wrap">
  <h1>プレミアム会員</h1>
  <p class="lead">メールでログインすると、まず<b>1日間は無料</b>で会員限定コンテンツを全部お試しできます。続けたい場合は月額500円で会員になれます。</p>

  <!-- 未ログイン -->
  <div id="loginCard" class="card hide">
    <div class="status">メールアドレスを入力すると、ログイン用の<b>6桁コード</b>が届きます（パスワード不要）。<br><span class="muted">スマホでメールを見ても、コードをこの端末に入力すればこの端末でログインできます。</span></div>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    <button id="sendCode">コードを送る</button>
    <div id="codeArea" class="hide" style="margin-top:16px">
      <div class="status">メールに届いた6桁コードを入力してください。</div>
      <input type="text" id="code" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" maxlength="6">
      <div style="margin-top:6px"><button id="verifyCode">ログイン</button> <button class="ghost" id="resendCode">コードを再送</button></div>
    </div>
    <div class="err" id="loginMsg"></div>
  </div>

  <!-- ログイン済み -->
  <div id="userCard" class="card hide">
    <div class="status">ログイン中：<b id="userEmail"></b> ・ <span id="memberBadge"></span></div>
    <div id="notMember" class="hide" style="margin-top:14px">
      <p style="font-size:14px;margin-bottom:12px" id="notMemberMsg"></p>
      <a class="btn" id="subscribeBtn" href="#" target="_blank" rel="noopener noreferrer">☕ プレミアム会員になる（月500円）</a>
      <div style="margin-top:12px"><button class="ghost" id="recheck">支払い後、状態を再確認</button></div>
    </div>
    <div style="margin-top:16px"><button class="ghost" id="logout">ログアウト</button></div>
  </div>

  <!-- 会員限定コンテンツ本体 -->
  <div id="premiumWrap" class="hide">
    <div id="premiumWelcome" class="card" style="background:linear-gradient(180deg,rgba(123,92,255,.12),rgba(123,92,255,.04));border-color:#4a3d8f"></div>
    <div class="tabs" id="tabs"></div>
    <div id="panels"></div>
  </div>

</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  let supabase = null;
  const $ = (id) => document.getElementById(id);
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  // メイン画面(philosophia.html)への埋め込みモード
  const EMBED = new URLSearchParams(location.search).get('embed')==='1';
  if(EMBED){ document.body.classList.add('embed'); }
  function notifyParent(access){ if(EMBED && window.parent!==window){ try{ window.parent.postMessage({type:'philo-access', access:!!access}, '*'); }catch(e){} } }
  // 埋め込み時：中身の高さを親に伝え、iframeを内容に合わせて伸縮させる（内部スクロール・余白を無くす）
  function notifyHeight(){ if(!(EMBED && window.parent!==window)) return;
    try{ var h=Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
      window.parent.postMessage({type:'philo-embed-height', height:h}, '*'); }catch(e){} }
  if(EMBED){
    window.addEventListener('load', notifyHeight);
    window.addEventListener('resize', notifyHeight);
    if('ResizeObserver' in window){ try{ new ResizeObserver(function(){ notifyHeight(); }).observe(document.body); }catch(e){} }
    document.addEventListener('click', function(){ setTimeout(notifyHeight,70); setTimeout(notifyHeight,400); });
    [200,600,1200,2000,3200,5000].forEach(function(ms){ setTimeout(notifyHeight, ms); });
  }

  async function refresh() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      $('loginCard').classList.remove('hide');
      $('userCard').classList.add('hide');
      $('premiumWrap').classList.add('hide');
      return;
    }
    $('loginCard').classList.add('hide');
    $('userCard').classList.remove('hide');
    $('userEmail').textContent = session.user.email;

    let me = { access: false, active: false, trial: false };
    try {
      const r = await fetch('/api/me', { headers: { Authorization: 'Bearer ' + session.access_token } });
      me = await r.json();
    } catch (e) {}
    notifyParent(me.access);  // 埋め込み時、親のメイン画面にログイン状態を伝える

    // バッジ表示
    if (me.active) {
      $('memberBadge').innerHTML = '<span class="badge on">✓ プレミアム会員</span>';
    } else if (me.trial) {
      const hrs = me.trial_ends ? Math.max(0, Math.ceil((new Date(me.trial_ends) - Date.now())/3600000)) : 0;
      $('memberBadge').innerHTML = '<span class="badge trial">⏳ 無料トライアル中（残り約' + hrs + '時間）</span>';
    } else {
      $('memberBadge').innerHTML = '<span class="badge off">未登録</span>';
    }

    if (me.access) {
      // アクセス権あり（会員 or トライアル）→ 限定コンテンツ表示
      $('notMember').classList.add('hide');
      $('premiumWrap').classList.remove('hide');
      loadPremium(session.access_token);
    } else {
      // トライアル終了・未課金 → 登録案内
      $('premiumWrap').classList.add('hide');
      $('notMember').classList.remove('hide');
      $('notMemberMsg').innerHTML = '無料トライアル（1日間）は終了しました。続けて会員限定コンテンツを読むには、月額500円のプレミアム会員にご登録ください。<br><span class="muted">※Stripeの購入画面では、ログインと<b>同じメールアドレス</b>をお使いください。</span>';
    }
  }

  let premiumLoaded = false;
  async function loadPremium(token) {
    if (premiumLoaded) return;
    try {
      const r = await fetch('/api/premium', { headers: { Authorization: 'Bearer ' + token } });
      if (!r.ok) { $('premiumWelcome').innerHTML = '<p class="muted">限定コンテンツの取得に失敗しました。再読み込みしてください。</p>'; return; }
      const data = await r.json();
      $('premiumWelcome').innerHTML = '<p style="margin-bottom:4px">📖 <b>会員限定エリア</b></p><p style="font-size:14px;color:#efeaff">' + esc(data.welcome) + '</p>';
      renderContent(data.content);
      premiumLoaded = true;
      // 埋め込み時：内容描画後に高さを親へ通知（画像等の遅延反映もリトライで拾う）
      if(EMBED){ [50,300,800,1500,2800].forEach(function(ms){ setTimeout(notifyHeight, ms); }); }
    } catch (e) {
      $('premiumWelcome').innerHTML = '<p class="muted">通信エラーが発生しました。</p>';
    }
  }

  function renderContent(c){
    const tabs = [
      { id:'courses', label:'📚 入門コース', render: renderCourses },
      { id:'deep', label:'🔬 哲学者・深掘り', render: renderDeep },
      { id:'classics', label:'📖 原典ガイド', render: renderClassics },
      { id:'themes', label:'🧭 テーマ解説', render: renderThemes },
      { id:'glossary', label:'🔤 用語辞典', render: renderGlossary },
      { id:'quizzes', label:'✅ クイズ', render: renderQuizzes },
    ];
    $('tabs').innerHTML = tabs.map((t,i)=>'<button class="tab'+(i===0?' active':'')+'" data-tab="'+t.id+'">'+t.label+'</button>').join('');
    $('panels').innerHTML = tabs.map((t,i)=>'<div class="panel'+(i===0?' active':'')+'" id="panel-'+t.id+'">'+t.render(c)+'</div>').join('');

    // タブ切替
    $('tabs').querySelectorAll('.tab').forEach(btn=>{
      btn.addEventListener('click',()=>{
        $('tabs').querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
        $('panels').querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        $('panel-'+btn.dataset.tab).classList.add('active');
        window.scrollTo({top:0,behavior:'smooth'});
      });
    });
    // アコーディオン開閉
    $('panels').querySelectorAll('.item>.head').forEach(h=>{
      h.addEventListener('click',()=>h.parentElement.classList.toggle('open'));
    });
    // 初級・中級・上級 切替
    $('panels').querySelectorAll('.lvltab').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const item=btn.closest('.item');
        item.querySelectorAll('.lvltab').forEach(b=>b.classList.remove('active'));
        item.querySelectorAll('.lvlpanel').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        const tgt=item.querySelector('.lvlpanel[data-lvl="'+btn.dataset.lvl+'"]');
        if(tgt) tgt.classList.add('active');
      });
    });
    // 用語検索
    const gs = document.getElementById('gsearch');
    if (gs) gs.addEventListener('input',()=>{
      const q = gs.value.trim();
      document.querySelectorAll('#panel-glossary .gitem').forEach(el=>{
        el.style.display = (!q || el.dataset.k.indexOf(q)>=0) ? '' : 'none';
      });
    });
    // クイズ
    $('panels').querySelectorAll('.choice').forEach(ch=>{
      ch.addEventListener('click',()=>{
        const box = ch.closest('.qbox');
        if (box.dataset.done) return;
        box.dataset.done = '1';
        const correct = +box.dataset.ans;
        box.querySelectorAll('.choice').forEach((c,i)=>{
          if (i===correct) c.classList.add('correct');
          else if (c===ch) c.classList.add('wrong');
        });
        box.querySelector('.explain').classList.add('show');
      });
    });
  }

  function renderCourses(c){
    return (c.COURSES||[]).map(co=>{
      const steps = co.steps.map(s=>'<div class="step"><div><span class="n">'+s.n+'</span><span class="nm">'+esc(s.name)+'</span></div><div class="why">'+esc(s.why)+'</div><div class="fc">▶ 注目：'+esc(s.focus)+'</div></div>').join('');
      return '<div class="item"><div class="head"><div><div class="ttl">'+esc(co.title)+'</div><div class="sub">'+esc(co.subtitle)+'</div><div class="meta">'+esc(co.level)+' ・ 約'+co.minutes+'分</div></div><div class="chev">▼</div></div><div class="body"><p class="intro-p">'+esc(co.intro)+'</p>'+steps+'<div class="kv" style="margin-top:12px"><div class="k">まとめ</div><div class="v">'+esc(co.outro)+'</div></div></div></div>';
    }).join('');
  }
  function renderSecs(arr){
    return (arr||[]).map(s=> s.h ? '<div class="kv"><div class="k">'+esc(s.h)+'</div><div class="v">'+esc(s.body)+'</div></div>'
                                 : '<p class="v" style="margin-bottom:10px">'+esc(s.body)+'</p>').join('');
  }
  function wc(arr){ return (arr||[]).reduce((n,s)=>n+((s.body||'').length),0); }
  function renderDeep(c){
    const items = (c.DEEPDIVES||[]);
    if(!items.length) return '<p class="muted">準備中です。</p>';
    return items.map(d=>{
      const bl = (label,arr)=> (arr&&arr.length)? '<div class="kv"><div class="k">'+label+'</div><div class="v">'+arr.map(x=>'・'+esc(x)).join('<br>')+'</div></div>' : '';
      const books = '<div class="kv" style="margin-top:14px"><div class="k">📚 参考文献</div></div>'+bl('日本語',d.booksJP)+bl('English',d.booksEN)+bl('Français',d.booksFR);
      let inner, badge='';
      if(d.levels){
        // 初級・中級・上級
        badge = '<span class="badge-lv">初級・中級・上級</span>';
        const L=d.levels;
        const panel=(key,secs)=>'<div class="lvlpanel'+(key==='b'?' active':'')+'" data-lvl="'+key+'"><div class="lvl-wc">約'+wc(secs)+'字</div>'+renderSecs(secs)+'</div>';
        inner = '<div class="lvltabs">'
          + '<button class="lvltab active" data-lvl="b">🌱 初級</button>'
          + '<button class="lvltab" data-lvl="i">📘 中級</button>'
          + '<button class="lvltab" data-lvl="a">🎓 上級</button></div>'
          + panel('b',L.beginner) + panel('i',L.intermediate) + panel('a',L.advanced)
          + books;
      } else {
        inner = renderSecs(d.sections) + books;
      }
      return '<div class="item"><div class="head"><div><div class="ttl">'+esc(d.name)+badge+'</div><div class="sub">深掘り解説＋参考文献</div></div><div class="chev">▼</div></div><div class="body"><p class="intro-p">'+esc(d.lead)+'</p>'+inner+'</div></div>';
    }).join('');
  }
  function renderClassics(c){
    return (c.CLASSICS||[]).map(b=>{
      const map = (b.map||[]).map(m=>'<div class="step"><div class="nm">'+esc(m.part)+'</div><div class="why">'+esc(m.gist)+'</div></div>').join('');
      return '<div class="item"><div class="head"><div><div class="ttl">'+esc(b.work)+'</div><div class="sub">'+esc(b.author)+' ／ '+esc(b.era)+'</div><div class="meta">難易度 '+esc(b.difficulty)+' ・ '+esc(b.pages)+'</div></div><div class="chev">▼</div></div><div class="body"><p class="intro-p">'+esc(b.why)+'</p><div class="kv"><div class="k">中身の地図</div></div>'+map+'<div class="kv" style="margin-top:12px"><div class="k">読み方のコツ</div><div class="v">'+esc(b.howto)+'</div></div><div class="kv"><div class="k">つまずきポイント</div><div class="v">'+esc(b.pitfalls)+'</div></div><div class="kv"><div class="k">次の一冊</div><div class="v">'+esc(b.next)+'</div></div></div></div>';
    }).join('');
  }
  function renderThemes(c){
    return (c.THEMES||[]).map(t=>{
      const pos = (t.positions||[]).map(p=>'<div class="pos"><div class="who">'+esc(p.thinker)+'</div><div class="claim">'+esc(p.claim)+'</div><div class="dt">'+esc(p.detail)+'</div></div>').join('');
      return '<div class="item"><div class="head"><div><div class="ttl">'+esc(t.title)+'</div></div><div class="chev">▼</div></div><div class="body"><div class="q-p">'+esc(t.question)+'</div><p class="intro-p">'+esc(t.intro)+'</p><div class="kv"><div class="k">主な立場</div></div>'+pos+'<div class="kv" style="margin-top:12px"><div class="k">対立の核心</div><div class="v">'+esc(t.tension)+'</div></div><div class="kv"><div class="k">持ち帰り</div><div class="v">'+esc(t.takeaway)+'</div></div></div></div>';
    }).join('');
  }
  function renderGlossary(c){
    const items = (c.GLOSSARY||[]).map(g=>{
      const key = (g.term+' '+(g.reading||'')+' '+(g.short||'')).toLowerCase();
      return '<div class="gitem" data-k="'+esc(key)+'"><div><span class="gt">'+esc(g.term)+'</span><span class="gr">'+esc(g.reading||'')+'</span></div><div class="gs">'+esc(g.short)+'</div><div class="gd">'+esc(g.detail)+'</div></div>';
    }).join('');
    return '<input type="text" id="gsearch" class="gsearch" placeholder="用語を検索（例：イデア、自由）">'+items;
  }
  function renderQuizzes(c){
    return (c.QUIZZES||[]).map(qz=>{
      const qs = (qz.questions||[]).map(q=>{
        const choices = q.choices.map(ch=>'<button class="choice">'+esc(ch)+'</button>').join('');
        return '<div class="qbox" data-ans="'+q.answer+'"><div class="qq">'+esc(q.q)+'</div>'+choices+'<div class="explain">'+esc(q.explain)+'</div></div>';
      }).join('');
      return '<div class="item open"><div class="head"><div><div class="ttl">'+esc(qz.title)+'</div><div class="sub">全'+qz.questions.length+'問・選ぶと即採点</div></div><div class="chev">▼</div></div><div class="body quiz">'+qs+'</div></div>';
    }).join('');
  }

  async function sendCode() {
    if (!supabase) { $('loginMsg').textContent = '準備中です。少し待って再度お試しください。'; return; }
    const email = $('email').value.trim();
    if (!email) { $('loginMsg').style.color='#e9a463'; $('loginMsg').textContent = 'メールアドレスを入力してください。'; return; }
    $('sendCode').disabled = true; $('resendCode').disabled = true;
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { shouldCreateUser: true, emailRedirectTo: window.location.href.split('#')[0] }
    });
    $('sendCode').disabled = false; $('resendCode').disabled = false;
    if (error) {
      $('loginMsg').style.color = '#e9a463';
      $('loginMsg').textContent = '送信エラー: ' + error.message;
    } else {
      $('codeArea').classList.remove('hide');
      $('loginMsg').style.color = '#84e0a8';
      $('loginMsg').textContent = 'メールに6桁コードを送りました。届いたコードを入力してください。';
      $('code').focus();
    }
  }
  async function verifyCode() {
    if (!supabase) return;
    const email = $('email').value.trim();
    const token = $('code').value.trim();
    if (!/^\d{6}$/.test(token)) { $('loginMsg').style.color='#e9a463'; $('loginMsg').textContent = '6桁の数字コードを入力してください。'; return; }
    $('verifyCode').disabled = true;
    // 既存ユーザーは type:'email'、新規ユーザー（サインアップ確認）は type:'signup' でコードが発行される。
    // まず 'email' で試し、ダメなら 'signup' でフォールバックする。
    let error = null;
    ({ error } = await supabase.auth.verifyOtp({ email, token, type: 'email' }));
    if (error) {
      const r2 = await supabase.auth.verifyOtp({ email, token, type: 'signup' });
      error = r2.error;
    }
    $('verifyCode').disabled = false;
    if (error) {
      $('loginMsg').style.color = '#e9a463';
      $('loginMsg').textContent = 'コードが違うか期限切れです：' + error.message;
    } else {
      $('loginMsg').textContent = '';
      premiumLoaded = false;
      refresh();
    }
  }
  $('sendCode').addEventListener('click', sendCode);
  $('resendCode').addEventListener('click', sendCode);
  $('verifyCode').addEventListener('click', verifyCode);
  $('code').addEventListener('keydown', (e) => { if (e.key === 'Enter') verifyCode(); });
  $('logout').addEventListener('click', async () => { await supabase.auth.signOut(); premiumLoaded=false; refresh(); });
  $('recheck').addEventListener('click', () => { premiumLoaded=false; refresh(); });

  (async () => {
    try {
      const cfg = await (await fetch('/api/config')).json();
      if (!cfg.url || !cfg.anonKey) throw new Error('config empty');
      supabase = createClient(cfg.url, cfg.anonKey);
      $('subscribeBtn').href = cfg.stripeLink || '#';
      supabase.auth.onAuthStateChange(() => refresh());
      refresh();
    } catch (e) {
      $('loginCard').classList.remove('hide');
      $('loginMsg').style.color = '#e9a463';
      $('loginMsg').textContent = 'サーバー設定の読み込みに失敗しました。少し待って再読み込みしてください。';
    }
  })();
</script>
<!-- 背景の光の粒子（会員ページ・マウス追従で密集）。埋め込み時は親画面の粒子を透かして見せる -->
<script>
(function(){
  var EMBED=new URLSearchParams(location.search).get('embed')==='1';
  if(EMBED){ document.documentElement.style.background='transparent'; document.body.style.background='transparent'; return; }
  var cv=document.getElementById('bgParticles'); if(!cv) return;
  var ctx=cv.getContext('2d');
  var DPR=Math.min(window.devicePixelRatio||1,2);
  var W=0,H=0,ps=[],t=0,raf=null,sprites=[];
  var reduced=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var pointer={x:-9999,y:-9999,vx:0,vy:0,active:false};
  var cols=['201,162,75','123,92,255','240,220,170','255,255,255','255,255,255','225,230,245'];
  function rnd(a,b){return a+Math.random()*(b-a);}
  function makeSprite(rgb){ var s=document.createElement('canvas'); s.width=s.height=16; var g=s.getContext('2d');
    var rg=g.createRadialGradient(8,8,0,8,8,8); rg.addColorStop(0,'rgba('+rgb+',1)'); rg.addColorStop(0.4,'rgba('+rgb+',0.5)'); rg.addColorStop(1,'rgba('+rgb+',0)');
    g.fillStyle=rg; g.fillRect(0,0,16,16); return s; }
  function resize(){ W=window.innerWidth;H=window.innerHeight;cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0); }
  function build(){ sprites=cols.map(makeSprite);
    var n=Math.min(3200, Math.round(W*H/650)); ps=[];
    for(var i=0;i<n;i++){ var hx=rnd(0,W), hy=rnd(0,H);
      ps.push({x:hx,y:hy,hx:hx,hy:hy,r:rnd(0.45,1.5),s:Math.floor(Math.random()*sprites.length),tw:rnd(0,6.28),tws:rnd(0.5,1.9),a:rnd(0.35,0.9),ph:rnd(0,6.28)}); } }
  function frame(){
    t+=0.016; pointer.vx*=0.86; pointer.vy*=0.86; ctx.clearRect(0,0,W,H); ctx.globalCompositeOperation='lighter';
    for(var i=0;i<ps.length;i++){ var p=ps[i];
      var wx=Math.cos(t*0.3+p.ph)*7, wy=Math.sin(t*0.26+p.ph)*7;
      p.x += (p.hx+wx - p.x)*0.02; p.y += (p.hy+wy - p.y)*0.02;
      var near=0;
      if(pointer.active){ var dx=pointer.x-p.x, dy=pointer.y-p.y, d2=dx*dx+dy*dy;
        if(d2<52900){ var d=Math.sqrt(d2)||1, f=1-d/230; near=f;
          p.x+=pointer.vx*f*0.55; p.y+=pointer.vy*f*0.55;
          p.x+=(-dy/d)*f*f*1.6; p.y+=(dx/d)*f*f*1.6;
          p.x+=(dx/d)*f*f*2.2;  p.y+=(dy/d)*f*f*2.2; } }
      var tw=0.55+0.45*Math.sin(t*p.tws+p.tw);
      var size=(p.r*(2.4+near*3.6))*(0.75+tw*0.5);
      var al=(p.a*(0.5+tw*0.6))*(0.72+near*0.9); if(al>1)al=1;
      ctx.globalAlpha=al; ctx.drawImage(sprites[p.s], p.x-size, p.y-size, size*2, size*2);
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
  function loop(){ frame(); raf=requestAnimationFrame(loop); }
  resize(); build();
  window.addEventListener('resize', function(){ resize(); build(); });
  var onMove=function(e){ var nx=e.clientX, ny=e.clientY; if(pointer.x>-9000){ pointer.vx=Math.max(-70,Math.min(70,nx-pointer.x)); pointer.vy=Math.max(-70,Math.min(70,ny-pointer.y)); } pointer.x=nx; pointer.y=ny; pointer.active=true; };
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerdown', onMove);
  window.addEventListener('pointerup', function(e){ if(e.pointerType&&e.pointerType!=='mouse') pointer.active=false; });
  document.addEventListener('mouseleave', function(){ pointer.active=false; });
  window.addEventListener('blur', function(){ pointer.active=false; });
  document.addEventListener('visibilitychange', function(){ if(document.hidden){ if(raf){cancelAnimationFrame(raf);raf=null;} } else if(!reduced && !raf){ raf=requestAnimationFrame(loop); } });
  if(reduced){ frame(); } else { raf=requestAnimationFrame(loop); }
})();
</script>
